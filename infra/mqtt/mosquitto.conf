# Mosquitto with mutual TLS — devices prove identity with a client cert.
listener 8883

# Server cert/key + the CA that signed device client certs.
cafile    /mosquitto/certs/ca-chain.pem
certfile  /mosquitto/certs/broker.pem
keyfile   /mosquitto/certs/broker.key

# Require + verify client certificates (mutual TLS).
require_certificate true
# Use the cert CN (= device_id) as the MQTT username for ACL matching.
use_identity_as_username true

# Deny anonymous; authorize by ACL (each device sees only its own topics).
allow_anonymous false
acl_file /mosquitto/config/acl
